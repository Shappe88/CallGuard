<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallGuard Admin Auth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="glass-panel" id="auth-panel">
      <div class="auth-header">
        <h1 id="auth-title">Admin Login</h1>
        <p id="auth-subtitle">Sign in to manage the CallGuard blocklist</p>
      </div>

      <form id="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-input" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" required autocomplete="current-password">
        </div>

        <div id="error-msg" class="error-message"></div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
      </form>

      <div class="auth-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a href="#" id="toggle-link">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
